name: Audit feedback

on:
  workflow_dispatch:
    inputs:
      findings:
        description: JSON array of read-only audit findings from urtext-spec-audit.js.
        required: true
        type: string
  schedule:
    - cron: '17 3 * * 1'

permissions:
  contents: read
  issues: write

jobs:
  collect:
    name: Collect audit evidence
    runs-on: ubuntu-latest
    outputs:
      findings: ${{ steps.findings.outputs.value }}
      has_findings: ${{ steps.findings.outputs.has_findings }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run check
      - run: npm test
      - run: npm run build
      - run: node dist/cli.js verify
      - id: findings
        env:
          INPUT_FINDINGS: ${{ inputs.findings }}
        run: |
          if [ "${{ github.event_name }}" = workflow_dispatch ]; then
            node -e 'const findings = JSON.parse(process.env.INPUT_FINDINGS); process.stdout.write(`value=${Buffer.from(JSON.stringify(findings)).toString("base64")}\nhas_findings=${findings.length > 0}\n`)' >> "$GITHUB_OUTPUT"
          else
            echo 'value=' >> "$GITHUB_OUTPUT"
            echo 'has_findings=false' >> "$GITHUB_OUTPUT"
          fi

  file:
    name: File admissible findings
    needs: collect
    if: ${{ needs.collect.result == 'success' && needs.collect.outputs.has_findings == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Deduplicate and file audit findings
        uses: actions/github-script@v7
        env:
          FINDINGS_BASE64: ${{ needs.collect.outputs.findings }}
        with:
          script: |
            const findings = JSON.parse(Buffer.from(process.env.FINDINGS_BASE64, 'base64').toString('utf8'))
            if (!Array.isArray(findings)) {
              core.setFailed('findings must be a JSON array')
              return
            }
            const lenses = new Set(['drift', 'soundness', 'consistency', 'formal'])
            const severities = new Set(['critical', 'high', 'medium', 'low'])
            const required = ['lens', 'severity', 'clause_ids', 'title', 'detail', 'ran']
            for (const finding of findings) {
              const missing = required.filter((key) => !(key in finding) || finding[key] === '' || (Array.isArray(finding[key]) && finding[key].length === 0))
              if (missing.length > 0 || !lenses.has(finding.lens) || !severities.has(finding.severity) || !Array.isArray(finding.clause_ids)) {
                core.warning(`Ignoring inadmissible audit finding ${JSON.stringify(finding.title ?? '')}`)
                continue
              }
              const title = `[audit] ${finding.title}`
              const existing = await github.paginate(github.rest.issues.listForRepo, {
                owner: context.repo.owner,
                repo: context.repo.repo,
                state: 'open',
                per_page: 100,
              })
              if (existing.some((issue) => issue.title === title)) {
                core.info(`Duplicate audit finding skipped: ${title}`)
                continue
              }
              const labels = ['loop:audit', 'evidence:required']
              if (finding.severity === 'critical' || finding.severity === 'high') labels.push('risk:high')
              const body = [
                `Lens: ${finding.lens}`,
                `Severity: ${finding.severity}`,
                `Clauses: ${finding.clause_ids.join(', ')}`,
                '',
                '## Finding',
                finding.detail,
                '',
                '## Commands actually run',
                finding.ran,
                '',
                `_Filed by audit feedback from ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}._`,
              ].join('\n')
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels,
              })
            }
